<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Administração - Sonho de Pijamas</title>

    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>Painel do Administrador</h1>
            <p class="subtitulo">Gerencie o catálogo de produtos da Sonho de Pijama</p>
        </header>

        <div class="conteudo-painel">

            <aside class="card-formulario">

                <h2>Cadastrar Novo Pijama</h2>

                <div class="form-grupo">
                    <label for="nome">Nome do Pijama</label>
                    <input type="text" id="nome">
                </div>

                <div class="form-grupo">
                    <label for="preco">Preço</label>
                    <input type="number" id="preco" step="0.01">
                </div>

                <div class="form-grupo">
                    <label for="categoria">Categoria</label>

                    <select id="categoria">
                        <option value="feminino">Feminino</option>
                        <option value="infantil feminino">Infantil Feminino</option>
                        <option value="masculino">Masculino</option>
                        <option value="infantil masculino">Infantil Masculino</option>
                    </select>

                </div>

                <div class="form-grupo">
                    <label for="arquivoimagem">Selecionar imagem</label>
                    <input type="file" id="arquivoimagem" accept="image/*">
                </div>

                <button class="btn-cadastrar" onclick="cadastrarProduto()">
                    Cadastrar Produto
                </button>

            </aside>

            <main class="area-tabela">

                <h2>Produtos Cadastrados</h2>

                <table>

                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th>Categoria</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="listaProdutos">

                    </tbody>

                </table>

            </main>
 
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
